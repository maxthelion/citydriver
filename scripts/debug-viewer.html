<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>City Debug Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: monospace; font-size: 14px; }
  #controls { padding: 8px 12px; background: #16213e; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  #controls label { color: #aaa; }
  #controls input, #controls select { background: #0f3460; color: #eee; border: 1px solid #444; padding: 4px 8px; font-family: monospace; }
  #controls button { background: #e94560; color: #fff; border: none; padding: 4px 12px; cursor: pointer; font-family: monospace; }
  #controls button:hover { background: #ff6b6b; }
  #main { display: flex; height: calc(100vh - 40px); }
  #sidebar { width: 220px; overflow-y: auto; background: #16213e; border-right: 1px solid #333; flex-shrink: 0; }
  #sidebar .item { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 6px; }
  #sidebar .item:hover { background: #1a1a4e; }
  #sidebar .item.active { background: #0f3460; color: #fff; }
  #sidebar .num { color: #e94560; min-width: 28px; }
  #sidebar .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #sidebar .missing { opacity: 0.3; }
  #viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #image-area { flex: 1; display: flex; overflow: hidden; }
  #image-container { flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 12px; position: relative; }
  #image-container img { image-rendering: pixelated; cursor: crosshair; }
  #image-container.zoomed img { cursor: zoom-out; }
  #grid-overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
  #grid-overlay.interactive { pointer-events: auto; }
  #zoom-panel { width: 400px; border-left: 1px solid #333; overflow: hidden; display: none; flex-direction: column; }
  #zoom-panel.visible { display: flex; }
  #zoom-panel .header { padding: 6px 10px; background: #16213e; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
  #zoom-panel .header button { background: #444; font-size: 12px; }
  #zoom-panel canvas { flex: 1; image-rendering: pixelated; }
  #status { padding: 4px 12px; background: #16213e; border-top: 1px solid #333; color: #888; font-size: 12px; }
  kbd { background: #333; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .grid-cell { position: absolute; border: 1px solid rgba(255,255,0,0.15); cursor: pointer; }
  .grid-cell:hover { border-color: rgba(255,255,0,0.6); background: rgba(255,255,0,0.08); }
  .grid-cell.selected { border-color: rgba(255,100,100,0.8); background: rgba(255,100,100,0.1); }
</style>
</head>
<body>

<div id="controls">
  <label>Dir:</label>
  <input id="dirInput" type="text" value="" placeholder="debug-latest" size="24">
  <button id="loadBtn">Load</button>
  <span id="info" style="color:#888"></span>
  <label style="margin-left:12px"><input type="checkbox" id="gridToggle"> Grid</label>
  <span style="flex:1"></span>
  <span style="color:#666"><kbd>&uarr;</kbd><kbd>&darr;</kbd> nav &nbsp; <kbd>scroll</kbd> zoom &nbsp; <kbd>g</kbd> grid toggle &nbsp; click cell for zoom</span>
</div>

<div id="main">
  <div id="sidebar"></div>
  <div id="viewer">
    <div id="image-area">
      <div id="image-container">
        <div id="grid-overlay"></div>
      </div>
      <div id="zoom-panel">
        <div class="header">
          <span id="zoom-title">Zoom</span>
          <button id="zoom-close">X</button>
        </div>
        <canvas id="zoom-canvas"></canvas>
      </div>
    </div>
    <div id="status"></div>
  </div>
</div>

<script>
let tiles = [];
let currentDir = '';
let currentIdx = 0;
let zoom = 2;
let gridVisible = false;
let gridCols = 8; // cells across
let selectedCell = null;
let cityParams = null; // {width, height, cellSize} from the city

const sidebar = document.getElementById('sidebar');
const container = document.getElementById('image-container');
const gridOverlay = document.getElementById('grid-overlay');
const status = document.getElementById('status');
const dirInput = document.getElementById('dirInput');
const info = document.getElementById('info');
const gridToggle = document.getElementById('gridToggle');
const zoomPanel = document.getElementById('zoom-panel');
const zoomCanvas = document.getElementById('zoom-canvas');
const zoomTitle = document.getElementById('zoom-title');
const zoomClose = document.getElementById('zoom-close');

function buildSidebar() {
  sidebar.innerHTML = '';
  tiles.forEach((tile, idx) => {
    const div = document.createElement('div');
    div.className = 'item' + (tile.missing ? ' missing' : '');
    div.dataset.idx = idx;
    div.innerHTML = `<span class="num">${tile.num}</span><span class="name">${tile.name}</span>`;
    div.addEventListener('click', () => selectTile(idx));
    sidebar.appendChild(div);
  });
}

function selectTile(idx) {
  if (idx < 0 || idx >= tiles.length) return;
  currentIdx = idx;
  sidebar.querySelectorAll('.item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  const active = sidebar.querySelector('.item.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
  showImage();
}

function resolveDir(dir) {
  const base = location.pathname.includes('/scripts/') ? '../' : '';
  return base + dir;
}

function checkImage(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = url;
  });
}

async function loadDir() {
  currentDir = dirInput.value.trim();
  if (!currentDir) return;

  info.textContent = `Scanning ${currentDir}...`;
  tiles = [];
  const base = resolveDir(currentDir);

  if (await checkImage(`${base}/00-region.png`)) {
    tiles.push({ num: '00', name: 'Region', url: `${base}/00-region.png` });
  }

  for (let i = 1; i <= 20; i++) {
    const num = String(i).padStart(2, '0');
    const found = await probeNumberedFile(base, num);
    if (found) tiles.push(found);
  }

  if (await checkImage(`${base}/grid.png`)) {
    tiles.push({ num: 'grid', name: 'Grid (all)', url: `${base}/grid.png` });
  }

  info.textContent = `${currentDir}: ${tiles.length} images`;
  buildSidebar();
  if (tiles.length > 0) selectTile(0);
}

async function probeNumberedFile(base, num) {
  const slugs = [
    'elevation', 'slope', 'water-mask', 'anchor-routes',
    'neighborhoods', 'neighborhood-map', 'density', 'density-v2',
    'districts', 'institutions', 'arterials', 'collectors', 'streets',
    'streets-plots', 'streets---plots',
    'loop-closure', 'rezone', 'plots', 'buildings',
    'amenities', 'land-cover',
  ];

  for (const slug of slugs) {
    const url = `${base}/${num}-${slug}.png`;
    if (await checkImage(url)) {
      const name = slug.split('-').filter(Boolean).map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
      return { num, name, url };
    }
  }
  return null;
}

function showImage() {
  const tile = tiles[currentIdx];
  // Remove old image but keep grid overlay
  const oldImg = container.querySelector('img');
  if (oldImg) oldImg.remove();
  container.className = '';

  if (!tile || !tile.url) {
    container.innerHTML = `<div style="color:#666;padding:40px">No image</div>`;
    status.textContent = 'No image';
    return;
  }

  const img = new Image();
  img.onload = () => {
    applyZoom(img);
    updateGrid(img);
    status.textContent = `${tile.num}. ${tile.name} — ${img.naturalWidth}x${img.naturalHeight} — zoom ${zoom}x`;
  };
  img.src = tile.url;
  container.insertBefore(img, gridOverlay);
}

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const img = container.querySelector('img');
  if (!img) return;
  if (e.deltaY < 0) {
    zoom = Math.min(zoom * 2, 16);
  } else {
    zoom = Math.max(zoom / 2, 0.5);
  }
  applyZoom(img);
  updateGrid(img);
  const tile = tiles[currentIdx];
  if (tile) {
    status.textContent = `${tile.num}. ${tile.name} — ${img.naturalWidth}x${img.naturalHeight} — zoom ${zoom}x`;
  }
}, { passive: false });

function applyZoom(img) {
  img.style.width = (img.naturalWidth * zoom) + 'px';
  img.style.height = (img.naturalHeight * zoom) + 'px';
  container.className = zoom > 1 ? 'zoomed' : '';
}

// --- Grid overlay ---

gridToggle.addEventListener('change', () => {
  gridVisible = gridToggle.checked;
  const img = container.querySelector('img');
  if (img) updateGrid(img);
});

function updateGrid(img) {
  gridOverlay.innerHTML = '';
  gridOverlay.style.width = img.style.width;
  gridOverlay.style.height = img.style.height;

  if (!gridVisible) {
    gridOverlay.className = '';
    return;
  }

  gridOverlay.className = 'interactive';

  const imgW = img.naturalWidth;
  const imgH = img.naturalHeight;
  const cellW = imgW / gridCols;
  const gridRows = Math.ceil(imgH / cellW);

  for (let row = 0; row < gridRows; row++) {
    for (let col = 0; col < gridCols; col++) {
      const div = document.createElement('div');
      div.className = 'grid-cell';
      if (selectedCell && selectedCell.row === row && selectedCell.col === col) {
        div.className += ' selected';
      }
      div.style.left = (col * cellW * zoom) + 'px';
      div.style.top = (row * cellW * zoom) + 'px';
      div.style.width = (cellW * zoom) + 'px';
      div.style.height = (Math.min(cellW, imgH - row * cellW) * zoom) + 'px';
      div.title = `Cell ${col},${row}`;
      div.addEventListener('click', (e) => {
        e.stopPropagation();
        onCellClick(col, row, img);
      });
      gridOverlay.appendChild(div);
    }
  }
}

function onCellClick(col, row, img) {
  selectedCell = { col, row };
  updateGrid(img);

  // Render zoomed view of this cell
  const imgW = img.naturalWidth;
  const imgH = img.naturalHeight;
  const cellW = imgW / gridCols;

  const sx = col * cellW;
  const sy = row * cellW;
  const sw = Math.min(cellW, imgW - sx);
  const sh = Math.min(cellW, imgH - sy);

  // Draw to canvas at high zoom
  const canvasSize = 400;
  zoomCanvas.width = canvasSize;
  zoomCanvas.height = canvasSize;
  const ctx = zoomCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvasSize, canvasSize);

  zoomTitle.textContent = `Cell ${col},${row} — ${Math.round(sw)}x${Math.round(sh)}px`;
  zoomPanel.classList.add('visible');
}

zoomClose.addEventListener('click', () => {
  zoomPanel.classList.remove('visible');
  selectedCell = null;
  const img = container.querySelector('img');
  if (img) updateGrid(img);
});

// --- Keyboard shortcuts ---

document.addEventListener('keydown', e => {
  if (e.target === dirInput) return;

  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    selectTile(Math.min(currentIdx + 1, tiles.length - 1));
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    selectTile(Math.max(currentIdx - 1, 0));
  } else if (e.key === '+' || e.key === '=') {
    zoom = Math.min(zoom * 2, 16);
    const img = container.querySelector('img');
    if (img) { applyZoom(img); updateGrid(img); }
  } else if (e.key === '-') {
    zoom = Math.max(zoom / 2, 0.5);
    const img = container.querySelector('img');
    if (img) { applyZoom(img); updateGrid(img); }
  } else if (e.key === 'g') {
    // Toggle grid
    gridVisible = !gridVisible;
    gridToggle.checked = gridVisible;
    const img = container.querySelector('img');
    if (img) updateGrid(img);
  } else if (e.key === 'Escape') {
    zoomPanel.classList.remove('visible');
    selectedCell = null;
    const img = container.querySelector('img');
    if (img) updateGrid(img);
  } else if (e.key >= '0' && e.key <= '9') {
    clearTimeout(window._numTimeout);
    if (window._numBuffer !== undefined && Date.now() - window._numTime < 500) {
      const combined = window._numBuffer * 10 + parseInt(e.key);
      const idx = tiles.findIndex(t => t.num === String(combined).padStart(2, '0'));
      if (idx >= 0) selectTile(idx);
      window._numBuffer = undefined;
    } else {
      window._numBuffer = parseInt(e.key);
      window._numTime = Date.now();
      window._numTimeout = setTimeout(() => {
        const idx = tiles.findIndex(t => t.num === String(window._numBuffer).padStart(2, '0'));
        if (idx >= 0) selectTile(idx);
        window._numBuffer = undefined;
      }, 300);
    }
  }
});

document.getElementById('loadBtn').addEventListener('click', loadDir);
dirInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadDir(); });

const urlParams = new URLSearchParams(location.search);
const dirParam = urlParams.get('dir');
if (dirParam) {
  dirInput.value = dirParam;
  loadDir();
}
</script>
</body>
</html>
