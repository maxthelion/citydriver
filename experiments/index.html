<!DOCTYPE html>
<html>
<head>
  <title>Experiments</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #1a1a2e; color: #ccc; display: flex; height: 100vh; }

    .sidebar {
      width: 280px; min-width: 280px; border-right: 1px solid #333;
      overflow-y: auto; padding: 12px; background: #16162a;
    }
    .sidebar h2 { color: #88aaff; font-size: 14px; margin-bottom: 12px; }

    .experiment {
      margin-bottom: 8px; cursor: pointer; padding: 8px;
      border: 1px solid #333; border-radius: 4px;
    }
    .experiment:hover { border-color: #88aaff; }
    .experiment.active { border-color: #88aaff; background: #222244; }
    .experiment .num { color: #88aaff; font-weight: bold; }
    .experiment .title { font-size: 12px; margin-top: 2px; }
    .experiment .stats { font-size: 10px; color: #666; margin-top: 4px; }

    .main { flex: 1; overflow-y: auto; padding: 16px; }

    .legend {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      padding: 10px 12px; background: #222240; border-radius: 4px;
      margin-bottom: 16px; font-size: 11px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch {
      width: 14px; height: 14px; border-radius: 2px; border: 1px solid #444;
      display: inline-block;
    }

    .images { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .image-card {
      background: #222240; border-radius: 4px; padding: 8px; max-width: 500px;
    }
    .image-card img {
      width: 100%; image-rendering: pixelated; border: 1px solid #333; cursor: zoom-in;
    }
    .image-card img.zoomed {
      max-width: none; width: auto; max-height: none; cursor: zoom-out;
    }
    .image-card .label {
      font-size: 11px; color: #888; margin-top: 4px; text-align: center;
    }

    .description {
      max-width: 800px; padding: 12px;
      background: #222240; border-radius: 4px; font-size: 12px; line-height: 1.6;
      white-space: pre-wrap;
    }
    .description h3 { color: #88aaff; margin-bottom: 6px; margin-top: 10px; }
    .description h3:first-child { margin-top: 0; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Experiments</h2>
    <div id="experiment-list"></div>
  </div>
  <div class="main" id="main"></div>

  <script>
    const LEGEND_ITEMS = [
      { label: 'Commercial', color: 'rgb(255,165,0)' },
      { label: 'Industrial', color: 'rgb(128,128,128)' },
      { label: 'Civic', color: 'rgb(0,100,255)' },
      { label: 'Open Space', color: 'rgb(0,200,0)' },
      { label: 'Agriculture', color: 'rgb(120,90,30)' },
      { label: 'Res. Fine', color: 'rgb(230,200,120)' },
      { label: 'Res. Estate', color: 'rgb(200,60,60)' },
      { label: 'Res. Quality', color: 'rgb(180,120,220)' },
      { label: 'Port', color: 'rgb(0,180,180)' },
      { label: 'Skeleton Road', color: 'rgb(255,255,255)' },
      { label: 'Growth Road', color: 'rgb(255,220,100)' },
    ];

    const experiments = [];

    async function scanExperiments() {
      for (let i = 1; i <= 100; i++) {
        const num = String(i).padStart(3, '0');
        const result = await tryFetchMd(num);
        if (!result) break;
        experiments.push(result);
      }
      experiments.reverse(); // most recent first
      renderList();
      if (experiments.length > 0) showExperiment(0);
    }

    async function tryFetchMd(num) {
      // Try to fetch the directory listing for this experiment's output
      const images = await findImages(num);

      // Try to find the markdown file — scan common slugs + try directory listing
      const slugsToTry = [
        'baseline', 'throttled-ribbon-roads', 'block-fill-residential',
        'reduced-road-spread', 'balanced-allocation', 'terrain-contours',
        'influence-tuning', 'port-zones', 'industrial-placement',
        'civic-typed-plots', 'agriculture-belt', 'cross-streets',
        'residential-bfs-fill', 'road-throttle', 'value-tuning',
        'zone-visualisation', 'zone-visualization', 'road-extension',
        'residential-fill', 'layout-ribbons', 'incremental-roads',
      ];

      for (const slug of slugsToTry) {
        try {
          const resp = await fetch(`${num}-${slug}.md`);
          if (resp.ok) {
            const text = await resp.text();
            const title = text.match(/^# Experiment \d+: (.+)/m)?.[1] || slug;
            return { num, slug, title, text, images };
          }
        } catch (e) {}
      }

      if (images.length > 0) {
        return { num, slug: 'unknown', title: `Experiment ${num}`, text: '', images };
      }
      return null;
    }

    async function findImages(num) {
      const images = [];
      const seeds = ['884469', '42', '12345'];
      const ticks = ['tick20', 'tick23', 'tick25', 'tick27', 'tick28', 'tick30', 'tick35', 'tick40', 'tick50'];
      const prefixes = ['reservations', 'zones', 'roadGrid', 'elevation', 'landValue',
                        'commercialValue', 'industrialValue', 'civicValue', 'developmentProximity',
                        'residentialFineValue', 'openSpaceValue', 'zoneGrid'];

      for (const prefix of prefixes) {
        for (const seed of seeds) {
          for (const tick of ticks) {
            const path = `${num}-output/${prefix}-seed${seed}-${tick}.png`;
            try {
              const resp = await fetch(path, { method: 'HEAD' });
              if (resp.ok) images.push({ path, seed, tick, layer: prefix });
            } catch (e) {}
          }
          // Also try without tick (e.g. zones-seed884469.png)
          const noTickPath = `${num}-output/${prefix}-seed${seed}.png`;
          try {
            const resp = await fetch(noTickPath, { method: 'HEAD' });
            if (resp.ok) images.push({ path: noTickPath, seed, tick: '', layer: prefix });
          } catch (e) {}
        }
      }
      return images;
    }

    function renderList() {
      const list = document.getElementById('experiment-list');
      list.innerHTML = '';
      experiments.forEach((exp, idx) => {
        const div = document.createElement('div');
        div.className = 'experiment';
        div.innerHTML = `
          <div class="num">${exp.num}</div>
          <div class="title">${exp.title}</div>
          <div class="stats">${exp.images.length} image${exp.images.length !== 1 ? 's' : ''}</div>
        `;
        div.onclick = () => showExperiment(idx);
        list.appendChild(div);
      });
    }

    function showExperiment(idx) {
      document.querySelectorAll('.experiment').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
      });

      const exp = experiments[idx];
      const main = document.getElementById('main');

      // Build legend
      let legendHtml = '<div class="legend">';
      for (const item of LEGEND_ITEMS) {
        legendHtml += `<div class="legend-item"><span class="legend-swatch" style="background:${item.color}"></span>${item.label}</div>`;
      }
      legendHtml += '</div>';

      // Build images (above text)
      let imagesHtml = '<div class="images">';
      if (exp.images.length === 0) {
        imagesHtml += '<div style="color:#666">No images found</div>';
      }
      for (const img of exp.images) {
        const layerLabel = img.layer || 'reservations';
        const tickLabel = img.tick ? ` @ ${img.tick}` : '';
        imagesHtml += `
          <div class="image-card">
            <img src="${img.path}" alt="${layerLabel} seed ${img.seed}" onclick="this.classList.toggle('zoomed')">
            <div class="label">${layerLabel} — seed ${img.seed}${tickLabel}</div>
          </div>
        `;
      }
      imagesHtml += '</div>';

      // Parse markdown into description sections
      const sections = exp.text.split(/^## /m).filter(Boolean);
      let descHtml = '';
      for (const section of sections) {
        const lines = section.trim().split('\n');
        const heading = lines[0];
        const body = lines.slice(1).join('\n').trim();
        if (heading.startsWith('# ')) continue;
        descHtml += `<h3>${heading}</h3>\n${body}\n\n`;
      }

      main.innerHTML = `
        <h2 style="color:#88aaff; margin-bottom:12px;">Experiment ${exp.num}: ${exp.title}</h2>
        ${legendHtml}
        ${imagesHtml}
        ${descHtml ? `<div class="description">${descHtml}</div>` : ''}
      `;
    }

    scanExperiments();
  </script>
</body>
</html>
