<!DOCTYPE html>
<html>
<head>
  <title>Experiments</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #1a1a2e; color: #ccc; display: flex; height: 100vh; }

    .sidebar {
      width: 280px; min-width: 280px; border-right: 1px solid #333;
      overflow-y: auto; padding: 12px; background: #16162a;
    }
    .sidebar h2 { color: #88aaff; font-size: 14px; margin-bottom: 12px; }

    .experiment {
      margin-bottom: 8px; cursor: pointer; padding: 8px;
      border: 1px solid #333; border-radius: 4px;
    }
    .experiment:hover { border-color: #88aaff; }
    .experiment.active { border-color: #88aaff; background: #222244; }
    .experiment .num { color: #88aaff; font-weight: bold; }
    .experiment .title { font-size: 12px; margin-top: 2px; }
    .experiment .stats { font-size: 10px; color: #666; margin-top: 4px; }

    .main { flex: 1; overflow-y: auto; padding: 16px; }
    .main-title { color: #88aaff; margin-bottom: 8px; }

    .legend {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      padding: 10px 12px; background: #222240; border-radius: 4px;
      margin-bottom: 16px; font-size: 11px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch {
      width: 18px; height: 18px; display: inline-flex;
      align-items: center; justify-content: center; flex: 0 0 auto;
    }
    .legend-swatch svg {
      width: 18px; height: 18px; display: block;
    }

    .viewer {
      display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 16px;
      align-items: start; margin-bottom: 16px;
    }
    .stage {
      min-width: 0;
      background: #222240; border-radius: 6px; padding: 12px;
      border: 1px solid #2e2e52;
    }
    .stage-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; margin-bottom: 10px;
    }
    .stage-title { font-size: 13px; color: #eef; }
    .stage-subtitle { font-size: 11px; color: #889; margin-top: 3px; }
    .stage-links {
      display: flex; gap: 8px; flex-wrap: wrap;
      font-size: 11px; justify-content: flex-end;
    }
    .stage-links a { color: #88aaff; text-decoration: none; }
    .stage-links a:hover { text-decoration: underline; }
    .stage-frame {
      position: relative;
      min-height: 62vh; max-height: 75vh; overflow: auto;
      border: 1px solid #333a5f; background: #101626; border-radius: 4px; padding: 8px;
    }
    .stage-frame img {
      display: block; width: 100%; height: auto; border: 1px solid #2a2f4b; background: #1a1d2d;
    }
    .stage-frame svg.stage-svg {
      display: block; width: 100%; height: auto; border: 1px solid #2a2f4b; background: #1a1d2d;
    }
    .stage-frame svg .is-active {
      filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.9));
    }
    .stage-frame svg .is-related {
      filter: drop-shadow(0 0 4px rgba(255, 232, 120, 1));
      stroke-width: 2.6px;
      opacity: 1;
    }
    .stage-frame img.pixelated {
      image-rendering: pixelated;
    }
    .stage-loading {
      color: #93a3d4; font-size: 12px; padding: 16px;
    }
    .svg-tooltip {
      position: fixed; z-index: 1000; max-width: 320px;
      padding: 8px 10px; border-radius: 6px; border: 1px solid #51639d;
      background: rgba(14, 20, 38, 0.96); color: #eef3ff;
      font-size: 11px; line-height: 1.45; white-space: pre-line;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      pointer-events: none; opacity: 0; transform: translateY(4px);
      transition: opacity 0.12s ease, transform 0.12s ease;
    }
    .svg-tooltip.visible {
      opacity: 1; transform: translateY(0);
    }
    .svg-tooltip.pinned {
      border-color: #88aaff;
    }

    .thumb-column {
      background: #16162a; border-radius: 6px; padding: 12px;
      border: 1px solid #2a2a44;
      position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow-y: auto;
    }
    .thumb-column h3 { color: #a8c0ff; font-size: 13px; margin-bottom: 10px; }
    .thumb-group { margin-bottom: 14px; }
    .thumb-group-title {
      font-size: 11px; color: #9aa3c9; text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .thumb-list { display: flex; flex-direction: column; gap: 8px; }
    .thumb {
      display: flex; gap: 8px; align-items: center; width: 100%;
      background: #20203a; border: 1px solid #303052; border-radius: 4px;
      padding: 6px; color: inherit; cursor: pointer; text-align: left;
    }
    .thumb:hover { border-color: #88aaff; }
    .thumb.active { border-color: #88aaff; background: #292950; }
    .thumb img {
      width: 88px; height: 66px; object-fit: cover; border: 1px solid #333; background: #111;
      flex: 0 0 auto;
    }
    .thumb img.pixelated { image-rendering: pixelated; }
    .thumb-text { min-width: 0; }
    .thumb-label { font-size: 11px; color: #eef; }
    .thumb-meta { font-size: 10px; color: #778; margin-top: 3px; }

    .description {
      max-width: 960px; padding: 12px;
      background: #222240; border-radius: 4px; font-size: 12px; line-height: 1.6;
      white-space: pre-wrap;
    }
    .description h3 { color: #88aaff; margin-bottom: 6px; margin-top: 10px; }
    .description h3:first-child { margin-top: 0; }

    .meta { font-size: 10px; color: #555; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Experiments</h2>
    <div id="experiment-list"></div>
  </div>
  <div class="main" id="main"></div>

  <script>
    const GENERIC_LEGEND_ITEMS = [
      { label: 'Commercial', color: 'rgb(255,165,0)' },
      { label: 'Industrial', color: 'rgb(128,128,128)' },
      { label: 'Civic', color: 'rgb(0,100,255)' },
      { label: 'Open Space', color: 'rgb(0,200,0)' },
      { label: 'Agriculture', color: 'rgb(120,90,30)' },
      { label: 'Res. Fine', color: 'rgb(230,200,120)' },
      { label: 'Res. Estate', color: 'rgb(200,60,60)' },
      { label: 'Res. Quality', color: 'rgb(180,120,220)' },
      { label: 'Port', color: 'rgb(0,180,180)' },
      { label: 'Skeleton Road', color: 'rgb(255,255,255)' },
      { label: 'Zone Boundary Road', color: 'rgb(0,255,255)' },
      { label: 'Growth Road', color: 'rgb(255,220,100)' },
      { label: 'Junction', color: 'rgb(255,50,50)' },
    ];

    const RIBBON_LEGEND_ITEMS = [
      { label: 'Zone boundary', kind: 'line', stroke: '#ffff00', strokeWidth: 2 },
      { label: 'Cross street', kind: 'line', stroke: '#ff00ff', strokeWidth: 2 },
      { label: 'Ribbon family', kind: 'family-line' },
      { label: 'Confirmed junction', kind: 'dot', fill: '#50c8ff', stroke: '#ffffff' },
      { label: 'Starting seed', kind: 'anchor-shape', shape: 'circle', stroke: '#ffd700' },
      { label: 'New family anchor', kind: 'anchor-shape', shape: 'diamond', stroke: '#ffd700' },
      { label: 'Follow-on anchor', kind: 'anchor-shape', shape: 'square', stroke: '#ffd700' },
      { label: 'Failed anchor outline', kind: 'anchor-shape', shape: 'circle', stroke: '#ff7800' },
      { label: 'Anchor sequence label', kind: 'sequence-label' },
    ];

    const RIBBON_FAILURE_ITEMS = [
      { label: 'Ray miss', kind: 'line', stroke: 'rgb(255, 210, 120)', strokeWidth: 2 },
      { label: 'Angle reject', kind: 'line', stroke: 'rgb(190, 60, 255)', strokeWidth: 2 },
      { label: 'Parallel gap / too close', kind: 'line', stroke: 'rgb(200, 110, 255)', strokeWidth: 2 },
      { label: 'Parallel / txn crossing', kind: 'line', stroke: 'rgb(255, 40, 40)', strokeWidth: 2 },
      { label: 'Projected landing', kind: 'dot', fill: '#78ffff', stroke: '#000000' },
      { label: 'Failure start', kind: 'dot', fill: '#dcdcdc', stroke: '#000000' },
      { label: 'Failure stop', kind: 'dot', fill: 'rgb(255, 120, 0)', stroke: '#000000' },
      { label: 'Conflict point', kind: 'conflict-point' },
    ];

    let experiments = [];
    let tooltipState = {
      element: null,
      pinnedTarget: null,
      activeTarget: null,
      relatedTargets: [],
    };

    async function init() {
      try {
        const resp = await fetch('manifest.json?t=' + Date.now());
        if (!resp.ok) { document.getElementById('main').textContent = 'No manifest.json found'; return; }
        const entries = await resp.json();

        for (const entry of entries) {
          const exp = await loadExperiment(entry);
          if (exp) experiments.push(exp);
        }
      } catch (e) {
        document.getElementById('main').textContent = 'Error loading manifest: ' + e.message;
        return;
      }

      experiments.reverse(); // newest first
      renderList();
      if (experiments.length > 0) showExperiment(0);
    }

    async function loadExperiment(entry) {
      const { num, slug, md } = entry;

      const images = (entry.images || []).map(img => ({
        path: img.path,
        seed: img.seed,
        tick: img.tick ? `tick${img.tick}` : '',
        layer: img.layer,
        format: img.format || extensionFromPath(img.path),
      }));

      let text = '', title = slug;
      if (md) {
        try {
          const resp = await fetch(md);
          if (resp.ok) {
            text = await resp.text();
            title = text.match(/^# (?:Experiment )?\S+: (.+)/m)?.[1] || slug;
          }
        } catch (e) {}
      }

      let meta = null;
      try {
        const manifestResp = await fetch(`${num}-output/manifest.json?t=${Date.now()}`);
        if (manifestResp.ok) meta = await manifestResp.json();
      } catch (e) {}

      const visuals = buildVisuals(images);
      return { num, slug, title, text, images, visuals, meta, selectedVisualKey: visuals[0]?.key || null };
    }

    function renderList() {
      const list = document.getElementById('experiment-list');
      list.innerHTML = '';
      experiments.forEach((exp, idx) => {
        const div = document.createElement('div');
        div.className = 'experiment';
        div.innerHTML = `
          <div class="num">${exp.num}</div>
          <div class="title">${exp.title}</div>
          <div class="stats">${exp.visuals.length} view${exp.visuals.length !== 1 ? 's' : ''}</div>
        `;
        div.onclick = () => showExperiment(idx);
        list.appendChild(div);
      });
    }

    function showExperiment(idx) {
      document.querySelectorAll('.experiment').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
      });

      const exp = experiments[idx];
      const main = document.getElementById('main');
      if (!exp.selectedVisualKey && exp.visuals[0]) exp.selectedVisualKey = exp.visuals[0].key;
      const selectedVisual = exp.visuals.find(visual => visual.key === exp.selectedVisualKey) || exp.visuals[0] || null;

      const legendHtml = renderLegend(legendItemsForSelection(exp, selectedVisual));

      let metaHtml = '';
      if (exp.meta) {
        const parts = [];
        if (exp.meta.archetype) parts.push(`archetype: ${exp.meta.archetype}`);
        if (exp.meta.ticks) parts.push(`ticks: ${exp.meta.ticks}`);
        if (exp.meta.script) parts.push(`script: ${exp.meta.script}`);
        if (exp.meta.generated) parts.push(`generated: ${new Date(exp.meta.generated).toLocaleString()}`);
        metaHtml = `<div class="meta">${parts.join(' · ')}</div>`;
      }

      const sections = exp.text.split(/^## /m).filter(Boolean);
      let descHtml = '';
      for (const section of sections) {
        const lines = section.trim().split('\n');
        const heading = lines[0];
        const body = lines.slice(1).join('\n').trim();
        if (heading.startsWith('# ')) continue;
        descHtml += `<h3>${heading}</h3>\n${body}\n\n`;
      }

      const viewerHtml = exp.visuals.length > 0
        ? renderViewer(exp, selectedVisual)
        : '<div style="color:#666; margin-bottom:16px;">No images — run: bun scripts/run-experiment.js --experiment ' + exp.num + '</div>';

      main.innerHTML = `
        <h2 class="main-title">Experiment ${exp.num}: ${exp.title}</h2>
        ${metaHtml}
        ${legendHtml}
        ${viewerHtml}
        ${descHtml ? `<div class="description">${descHtml}</div>` : ''}
      `;

      main.querySelectorAll('.thumb').forEach(button => {
        button.addEventListener('click', () => {
          exp.selectedVisualKey = button.dataset.key;
          showExperiment(idx);
        });
      });

      const stageFrame = main.querySelector('.stage-frame');
      if (stageFrame && selectedVisual) {
        hydrateStageFrame(stageFrame, selectedVisual);
      }
    }

    function renderViewer(exp, selectedVisual) {
      const groups = groupVisualsByZone(exp.visuals);
      const links = [];
      if (selectedVisual?.paths.svg) links.push(`<a href="${selectedVisual.paths.svg}" target="_blank" rel="noopener">Open SVG</a>`);
      if (selectedVisual?.paths.png) links.push(`<a href="${selectedVisual.paths.png}" target="_blank" rel="noopener">Open PNG</a>`);

      return `
        <div class="viewer">
          <div class="stage">
            <div class="stage-header">
              <div>
                <div class="stage-title">${selectedVisual?.displayLabel || 'Output'}</div>
                <div class="stage-subtitle">${selectedVisual?.detailLabel || ''}</div>
              </div>
            <div class="stage-links">${links.join('')}</div>
          </div>
            <div class="stage-frame" data-key="${selectedVisual?.key || ''}" data-label="${selectedVisual?.displayLabel || 'output'}">
              <div class="stage-loading">Loading view…</div>
            </div>
          </div>
          <div class="thumb-column">
            <h3>Zones</h3>
            ${groups.map(group => `
              <div class="thumb-group">
                <div class="thumb-group-title">${group.label}</div>
                <div class="thumb-list">
                  ${group.items.map(item => `
                    <button class="thumb ${item.key === selectedVisual?.key ? 'active' : ''}" data-key="${item.key}">
                      <img src="${item.paths.png || item.paths.svg}" alt="${item.displayLabel}" class="${item.paths.png ? 'pixelated' : ''}">
                      <span class="thumb-text">
                        <span class="thumb-label">${item.displayLabel}</span>
                        <span class="thumb-meta">${item.detailLabel}</span>
                      </span>
                    </button>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    async function hydrateStageFrame(stageFrame, selectedVisual) {
      if (!stageFrame || !selectedVisual) return;
      clearPinnedTooltip();
      const visualKey = selectedVisual.key || '';
      stageFrame.dataset.visualKey = visualKey;

      if (selectedVisual.paths.svg) {
        stageFrame.innerHTML = '<div class="stage-loading">Loading SVG…</div>';
        try {
          const resp = await fetch(`${selectedVisual.paths.svg}?t=${Date.now()}`);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const text = await resp.text();
          if (stageFrame.dataset.visualKey !== visualKey) return;

          const doc = new DOMParser().parseFromString(text, 'image/svg+xml');
          const svg = doc.documentElement;
          if (!svg || svg.nodeName.toLowerCase() !== 'svg') {
            throw new Error('invalid SVG');
          }
          svg.classList.add('stage-svg');
          svg.removeAttribute('width');
          svg.removeAttribute('height');
          stageFrame.innerHTML = '';
          stageFrame.appendChild(document.importNode(svg, true));
          bindSvgInteractivity(stageFrame);
          return;
        } catch (error) {
          console.warn('Failed to load SVG view', error);
        }
      }

      renderStageImage(stageFrame, selectedVisual);
    }

    function renderStageImage(stageFrame, selectedVisual) {
      clearPinnedTooltip();
      if (selectedVisual?.paths.png) {
        stageFrame.innerHTML = `<img src="${selectedVisual.paths.png}" alt="${selectedVisual?.displayLabel || 'output'}" class="pixelated">`;
        return;
      }
      if (selectedVisual?.paths.svg) {
        stageFrame.innerHTML = `<img src="${selectedVisual.paths.svg}" alt="${selectedVisual?.displayLabel || 'output'}">`;
        return;
      }
      stageFrame.innerHTML = '<div class="stage-loading">No render found for this view.</div>';
    }

    function bindSvgInteractivity(stageFrame) {
      const svg = stageFrame.querySelector('svg');
      if (!svg) return;
      ensureTooltip();

      stageFrame.onpointermove = event => {
        if (tooltipState.pinnedTarget) return;
        const target = findTooltipTarget(event.target);
        if (!target) {
          clearActiveTooltip();
          stageFrame.style.cursor = 'default';
          return;
        }
        stageFrame.style.cursor = 'pointer';
        showTooltipForTarget(target, event.clientX, event.clientY, false);
      };

      stageFrame.onpointerleave = () => {
        if (!tooltipState.pinnedTarget) {
          clearActiveTooltip();
        }
        stageFrame.style.cursor = 'default';
      };

      stageFrame.onclick = event => {
        const target = findTooltipTarget(event.target);
        if (!target) {
          clearPinnedTooltip();
          return;
        }
        event.stopPropagation();
        if (tooltipState.pinnedTarget === target) {
          clearPinnedTooltip();
          return;
        }
        showTooltipForTarget(target, event.clientX, event.clientY, true);
      };
    }

    function ensureTooltip() {
      if (tooltipState.element) return tooltipState.element;
      const tooltip = document.createElement('div');
      tooltip.className = 'svg-tooltip';
      document.body.appendChild(tooltip);
      tooltipState.element = tooltip;
      document.addEventListener('click', event => {
        if (!tooltipState.pinnedTarget) return;
        if (tooltip.contains(event.target)) return;
        clearPinnedTooltip();
      });
      return tooltip;
    }

    function findTooltipTarget(node) {
      return node && node.closest ? node.closest('[data-tooltip]') : null;
    }

    function showTooltipForTarget(target, clientX, clientY, pinned) {
      const tooltip = ensureTooltip();
      const content = target.querySelector('title')?.textContent
        || target.dataset.tooltip
        || target.dataset.label
        || '';
      if (!content) return;

      tooltip.textContent = content;
      tooltip.classList.add('visible');
      tooltip.classList.toggle('pinned', pinned);
      positionTooltip(tooltip, clientX, clientY);

      if (tooltipState.activeTarget && tooltipState.activeTarget !== target) {
        tooltipState.activeTarget.classList.remove('is-active');
      }
      clearRelatedHighlights();
      target.classList.add('is-active');
      tooltipState.activeTarget = target;
      applyRelatedHighlights(target);
      if (pinned) {
        tooltipState.pinnedTarget = target;
      }
    }

    function clearActiveTooltip() {
      const tooltip = ensureTooltip();
      if (tooltipState.pinnedTarget) return;
      tooltip.classList.remove('visible', 'pinned');
      if (tooltipState.activeTarget) {
        tooltipState.activeTarget.classList.remove('is-active');
      }
      tooltipState.activeTarget = null;
      clearRelatedHighlights();
    }

    function clearPinnedTooltip() {
      tooltipState.pinnedTarget = null;
      if (tooltipState.activeTarget) {
        tooltipState.activeTarget.classList.remove('is-active');
      }
      tooltipState.activeTarget = null;
      clearRelatedHighlights();
      if (tooltipState.element) {
        tooltipState.element.classList.remove('visible', 'pinned');
      }
    }

    function applyRelatedHighlights(target) {
      const svg = target.ownerSVGElement;
      if (!svg) return;

      const related = [];
      const conflictRowId = target.dataset.conflictRowId;
      if (conflictRowId) {
        for (const el of svg.querySelectorAll(`.debug-ribbon[data-row-id="${cssEscape(conflictRowId)}"]`)) {
          el.classList.add('is-related');
          related.push(el);
        }
      }

      const failureIdx = target.dataset.failureIdx;
      if (failureIdx) {
        for (const el of svg.querySelectorAll(`.debug-conflict-point[data-failure-idx="${cssEscape(failureIdx)}"]`)) {
          if (el !== target) {
            el.classList.add('is-related');
            related.push(el);
          }
        }
      }

      tooltipState.relatedTargets = related;
    }

    function clearRelatedHighlights() {
      for (const el of tooltipState.relatedTargets) {
        el.classList.remove('is-related');
      }
      tooltipState.relatedTargets = [];
    }

    function positionTooltip(tooltip, clientX, clientY) {
      const offset = 14;
      const maxWidth = Math.min(tooltip.offsetWidth || 320, window.innerWidth - 24);
      let left = clientX + offset;
      let top = clientY + offset;
      if (left + maxWidth > window.innerWidth - 12) {
        left = Math.max(12, clientX - maxWidth - offset);
      }
      const maxHeight = tooltip.offsetHeight || 120;
      if (top + maxHeight > window.innerHeight - 12) {
        top = Math.max(12, clientY - maxHeight - offset);
      }
      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
    }

    function buildVisuals(images) {
      const merged = new Map();
      for (const image of images) {
        const key = [image.layer || 'output', image.seed || '', image.tick || ''].join('::');
        if (!merged.has(key)) {
          const zone = parseZone(image.layer);
          merged.set(key, {
            key,
            layer: image.layer || 'output',
            seed: image.seed || null,
            tick: image.tick || null,
            zone,
            isFailure: (image.layer || '').includes('failure'),
            paths: {},
          });
        }
        const item = merged.get(key);
        const format = image.format || extensionFromPath(image.path);
        if (format) item.paths[format] = image.path;
      }

      return [...merged.values()]
        .map(item => ({
          ...item,
          displayLabel: visualDisplayLabel(item),
          detailLabel: visualDetailLabel(item),
        }))
        .sort(compareVisuals);
    }

    function groupVisualsByZone(visuals) {
      const groups = new Map();
      for (const visual of visuals) {
        const key = visual.zone !== null ? `zone-${visual.zone}` : 'other';
        if (!groups.has(key)) {
          groups.set(key, {
            key,
            order: visual.zone !== null ? visual.zone : 999,
            label: visual.zone !== null ? `Zone ${visual.zone}` : 'Other',
            items: [],
          });
        }
        groups.get(key).items.push(visual);
      }
      return [...groups.values()]
        .sort((a, b) => a.order - b.order || a.label.localeCompare(b.label))
        .map(group => ({
          ...group,
          items: group.items.sort(compareVisuals),
        }));
    }

    function compareVisuals(a, b) {
      const zoneA = a.zone === null ? 999 : a.zone;
      const zoneB = b.zone === null ? 999 : b.zone;
      if (zoneA !== zoneB) return zoneA - zoneB;
      if (a.isFailure !== b.isFailure) return a.isFailure ? 1 : -1;
      if ((a.seed || '') !== (b.seed || '')) return (a.seed || '').localeCompare(b.seed || '');
      return a.layer.localeCompare(b.layer);
    }

    function parseZone(layer) {
      const match = String(layer || '').match(/zone(\d+)/i);
      return match ? parseInt(match[1], 10) : null;
    }

    function visualDisplayLabel(item) {
      const layer = item.layer || 'output';
      if (layer.startsWith('ribbons-zone')) return 'Ribbons';
      if (layer.startsWith('ribbon-failures-zone')) return 'Failures';
      return humanizeLayer(layer);
    }

    function visualDetailLabel(item) {
      const parts = [];
      if (item.zone !== null) parts.push(`zone ${item.zone}`);
      if (item.seed) parts.push(`seed ${item.seed}`);
      if (item.tick) parts.push(item.tick);
      if (!item.layer.startsWith('ribbons-zone') && !item.layer.startsWith('ribbon-failures-zone')) {
        parts.unshift(humanizeLayer(item.layer));
      }
      return parts.join(' · ');
    }

    function humanizeLayer(layer) {
      return String(layer || 'output')
        .replace(/-/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function extensionFromPath(path) {
      const match = String(path || '').match(/\.([^.]+)$/);
      return match ? match[1].toLowerCase() : null;
    }

    function legendItemsForSelection(exp, selectedVisual) {
      const isRibbon = exp?.meta?.script === 'render-sector-ribbons.js'
        || /ribbon/i.test(selectedVisual?.layer || '');
      if (!isRibbon) return GENERIC_LEGEND_ITEMS.map(item => ({ ...item, kind: 'box' }));
      return selectedVisual?.isFailure
        ? [...RIBBON_LEGEND_ITEMS, ...RIBBON_FAILURE_ITEMS]
        : RIBBON_LEGEND_ITEMS;
    }

    function renderLegend(items) {
      return `
        <div class="legend">
          ${items.map(item => `
            <div class="legend-item">
              <span class="legend-swatch">${legendIcon(item)}</span>
              <span>${item.label}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    function legendIcon(item) {
      if (item.kind === 'box') {
        return `<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="14" height="14" rx="2" fill="${item.color}" stroke="#444"/></svg>`;
      }
      if (item.kind === 'line') {
        return `<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><line x1="2" y1="14" x2="16" y2="4" stroke="${item.stroke}" stroke-width="${item.strokeWidth || 2}" stroke-linecap="round"/></svg>`;
      }
      if (item.kind === 'family-line') {
        return `<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><line x1="2" y1="14" x2="7" y2="10" stroke="#4ad1ff" stroke-width="2" stroke-linecap="round"/><line x1="7" y1="10" x2="11" y2="8" stroke="#8aff7a" stroke-width="2" stroke-linecap="round"/><line x1="11" y1="8" x2="16" y2="4" stroke="#ffb347" stroke-width="2" stroke-linecap="round"/></svg>`;
      }
      if (item.kind === 'dot') {
        return `<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="9" r="4" fill="${item.fill}" stroke="${item.stroke || 'none'}" stroke-width="1.4"/></svg>`;
      }
      if (item.kind === 'ring') {
        return `<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="9" r="5" fill="none" stroke="${item.stroke}" stroke-width="2"/></svg>`;
      }
      if (item.kind === 'anchor-shape') {
        if (item.shape === 'diamond') {
          return `<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><polygon points="9,2 16,9 9,16 2,9" fill="none" stroke="${item.stroke}" stroke-width="2"/></svg>`;
        }
        if (item.shape === 'square') {
          return `<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="12" height="12" fill="none" stroke="${item.stroke}" stroke-width="2"/></svg>`;
        }
        return `<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="9" r="5" fill="none" stroke="${item.stroke}" stroke-width="2"/></svg>`;
      }
      if (item.kind === 'sequence-label') {
        return `<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><text x="4" y="13" font-family="monospace" font-size="9" fill="#fff" stroke="#000" stroke-width="0.8" paint-order="stroke fill">12</text></svg>`;
      }
      if (item.kind === 'conflict-point') {
        return `<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="9" r="6" fill="none" stroke="#fff" stroke-width="1.2"/><line x1="4" y1="4" x2="14" y2="14" stroke="#fff" stroke-width="1.6"/><line x1="4" y1="14" x2="14" y2="4" stroke="#fff" stroke-width="1.6"/></svg>`;
      }
      return '';
    }

    function cssEscape(value) {
      if (window.CSS && typeof window.CSS.escape === 'function') {
        return window.CSS.escape(String(value));
      }
      return String(value).replace(/["\\]/g, '\\$&');
    }

    init();
  </script>
</body>
</html>
