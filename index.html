<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open World Driving</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }

#ui-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

#minimap {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 200px;
  height: 200px;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 8px;
  overflow: hidden;
  pointer-events: auto;
  background: #1a2a1a;
}

#minimap-canvas {
  width: 100%;
  height: 100%;
}

#controls-panel {
  position: fixed;
  top: 20px;
  left: 20px;
  pointer-events: auto;
}

#regenerate-btn {
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.2s;
}
#regenerate-btn:hover {
  background: rgba(50,50,50,0.9);
}

#speed-display {
  position: fixed;
  bottom: 20px;
  left: 20px;
  color: #0f0;
  font-size: 28px;
  font-family: 'Courier New', monospace;
  text-shadow: 0 0 10px rgba(0,255,0,0.5);
  pointer-events: none;
}

#help-text {
  position: fixed;
  top: 20px;
  right: 20px;
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  text-align: right;
  pointer-events: none;
  line-height: 1.6;
}

#loading {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 24px;
  z-index: 100;
  transition: opacity 0.3s;
}
</style>
</head>
<body>

<div id="loading">Generating city...</div>

<div id="ui-overlay">
  <div id="controls-panel">
    <button id="regenerate-btn">Regenerate City</button>
  </div>
  <div id="speed-display">0 MPH</div>
  <div id="help-text">
    W / Up - Accelerate<br>
    S / Down - Brake/Reverse<br>
    A / Left - Steer Left<br>
    D / Right - Steer Right<br>
    Space - Handbrake<br>
    C - Toggle Camera
  </div>
  <div id="minimap">
    <canvas id="minimap-canvas"></canvas>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import { Game } from './src/game.js';
new Game();
</script>
</body>
</html>
